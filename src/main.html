<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="main.css" />
    <style>
      html {
        width: 300px; /* max: 800px */
        height: 380px;
        font-family: Arial, Helvetica, sans-serif;
      }

      #popUpBody {
        color: rgb(255, 255, 255);
        background-color: rgb(0, 76, 121);
      }

      .AIStatus {
        border: 4px solid black;
        background-color: rgb(0, 53, 83);
        border-radius: 0.5em;
      }
    </style>
    <title>ClassifierAI</title>
  </head>

  <body id="popUpBody" class="text-center p-3">
    <div class="flex justify-center">
      <label
        for="AICheck"
        class="inline-flex items-center gap-3 cursor-pointer"
      >
        <input type="checkbox" id="AICheck" class="peer sr-only" />
        <div
          class="relative h-6 w-11 rounded-full bg-slate-300 transition-colors duration-200 peer-checked:bg-cyan-500 after:absolute after:left-0.5 after:top-0.5 after:h-5 after:w-5 after:rounded-full after:bg-white after:transition-all after:duration-200 after:content-[''] peer-checked:after:translate-x-5"
        ></div>
        <p class="m-0">AI Image Scan</p>
      </label>
    </div>

    <div class="AIStatus p-3 mt-3">
      <p class="mb-3">Based on <span id="TotalImageScan">0</span> images:</p>

      <div class="flex items-center justify-center gap-2 py-1">
        <img src="../Images/AIFree.png" width="25em" />
        <p class="m-0"><span id="NotAIStat">0</span> are not AI generated</p>
      </div>

      <div class="flex items-center justify-center gap-2 py-1">
        <img src="../Images/AINeutral.png" width="25em" />
        <p class="m-0">
          <span id="AINeutralStat">0</span> could be AI generated
        </p>
      </div>

      <div class="flex items-center justify-center gap-2 py-1">
        <img src="../Images/AIGenerated.png" width="25em" />
        <p class="m-0"><span id="AIGenStat">0</span> are AI generated</p>
      </div>
    </div>

    <h6 class="m-2 text-sm font-semibold">Thank you for using ClassifierAI</h6>

    <script type="module" src="popup.js"></script>
  </body>
</html>
