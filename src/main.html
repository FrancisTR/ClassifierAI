<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="main.css" />
    <style>
      html {
        width: 300px; /* max: 800px */
        height: 380px;
        font-family: Arial, Helvetica, sans-serif;
      }

      #popUpBody {
        color: #f8fafc;
        background: #012444;
      }

      .AIStatus {
        background: #002645;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
      }
    </style>
    <title>ClassifierAI</title>
  </head>

  <body id="popUpBody" class="text-center p-3">
    <header class="flex justify-center mt-4 mb-4">
      <label
        for="AICheck"
        class="inline-flex items-center gap-4 cursor-pointer"
      >
        <input type="checkbox" id="AICheck" class="peer sr-only" />

        <h1 class="font-medium text-base tracking-wide">Classifier AI</h1>

        <div
          class="relative h-6 w-11 rounded-full bg-slate-500 transition-colors duration-200 peer-checked:bg-blue-600 after:absolute after:left-0.5 after:top-0.5 after:h-5 after:w-5 after:rounded-full after:bg-white after:transition-all after:duration-200 after:content-[''] peer-checked:after:translate-x-5"
        ></div>
      </label>
    </header>

    <main class="AIStatus py-4 px-8">
      <div>
        <p id="TotalImageScan" class="text-4xl font-bold leading-tight">0</p>
        <p class="mb-4 text-sm text-slate-300 tracking-wide">Images Scanned</p>
      </div>

      <ul>
        <li class="flex items-center justify-between">
          <div class="flex gap-4 flex-row items-center">
            <img src="../Images/AIFree.png" width="25em" />
            <p class="m-0">Human</p>
          </div>

          <p id="NotAIStat">0</p>
        </li>

        <li class="flex items-center justify-between">
          <div class="flex gap-4 flex-row items-center">
            <img src="../Images/AINeutral.png" width="25em" />
            <p class="m-0">Unsure</p>
          </div>

          <p id="AINeutralStat">0</p>
        </li>

        <li class="flex items-center justify-between">
          <div class="flex gap-4 flex-row items-center">
            <img src="../Images/AIGenerated.png" width="25em" />
            <p class="m-0">AI Generated</p>
          </div>

          <p id="AIGenStat">0</p>
        </li>
      </ul>
    </main>

    <footer>
      <p class="m-2 text-sm font-semibold">Thank you for using ClassifierAI</p>
    </footer>
    <script type="module" src="popup.js"></script>
  </body>
</html>
